aid: ldap
name: LDAP
description: >-
  LDAP (Lightweight Directory Access Protocol) is an industry-standard protocol
  for accessing and maintaining distributed directory information services over
  an IP network. It plays a critical role in protecting organizational assets
  and maintaining a strong security posture through centralized authentication.
